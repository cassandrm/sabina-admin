        "requiredMessage": "La ragione sociale dell'impresa ausiliaria è obbligatoria in caso di avvalimento",
        "minLength": 2,
        "maxLength": 500
      },
      {
        "field": "Avvalimento.CodiceFiscaleAusiliaria",
