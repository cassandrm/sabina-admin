        "formatMessage": "Il codice fiscale deve essere di 16 caratteri (persone fisiche) o 11 cifre (persone giuridiche)",
        "requiredIf": {
          "field": "Avvalimento.RagioneSocialeAusiliaria",
          "operator": "!=",
          "value": ""
        }
      },
      {
        "field": "Avvalimento.PartitaIVAAusiliaria",
        "label_field": "Partita IVA Impresa Ausiliaria",
        "required": false,
        "requiredMessage": "La partita IVA dell'impresa ausiliaria è obbligatoria in caso di avvalimento",
        "pattern": "^[0-9]{11}$",
        "formatMessage": "La partita IVA deve essere composta da esattamente 11 cifre",
        "requiredIf": {
          "field": "Avvalimento.RagioneSocialeAusiliaria",
          "operator": "!=",
          "value": ""
        }
      },
      {
        "field": "Firma.Luogo",
        "label_field": "Luogo di Sottoscrizione",
        "required": false,
        "requiredMessage": "Il luogo è obbligatorio",
        "pattern": "^[A-Za-zÀ-ÿ\\s\\'\\-\\.]+$",
        "formatMessage": "Il luogo di sottoscrizione deve contenere solo lettere e caratteri validi",
        "minLength": 2,
        "maxLength": 100
      },
      {
        "field": "Firma.Data",
        "label_field": "Data di Sottoscrizione",
        "required": false,
